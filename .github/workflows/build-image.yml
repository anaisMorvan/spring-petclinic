name: "Build image - CI"
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Docker image
        run: ./mvnw spring-boot:build-image -DskipTests
  
  update-gitops:
    needs: build # Mettre ici le nom de votre job précédent (celui qui push sur GHCR)
    runs-on: ubuntu-latest
    steps:
      - name: Cloner le dépôt d'infrastructure
        uses: actions/checkout@v4
        with:
          repository: 'anaisMorvan/tp9-argocd' # A REMPLACER (ex: <VOTRE_USER_GITHUB>/gitops-infra)
          token: ${{ secrets.GITOPS_PATH }}
          path: 'infra-repo' # On clone dans un sous-dossier pour ne pas écraser l'espace de travail

      - name: Mettre à jour la version de l'image
        working-directory: ./infra-repo/overlays/dev
        run: |
          kustomize edit set image spring-petclinic=ghcr.io/anaismorvan/spring-petclinic:${{ github.sha }}

      - name: Commit et Push vers le dépôt d'infrastructure
        working-directory: ./infra-repo
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Auto-update image to tag ${{ github.sha }}"
          git push